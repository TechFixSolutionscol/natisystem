<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo 3D - Nati System</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-glow: #6366f1;
            --bingo-gold: #fbbf24;
            --ball-white: #f8fafc;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Ambient background effect */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        /* ESCENA 3D */
        .game-scene {
            perspective: 1200px;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            padding: 20px;
        }

        /* TABLA DE BINGO 3D */
        .bingo-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            transform: rotateX(10deg) rotateY(-5deg);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
        }

        .bingo-card:hover {
            transform: rotateX(0deg) rotateY(0deg) scale(1.02);
            border-color: var(--accent-glow);
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.2);
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .bingo-cell {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .bingo-cell.marked {
            background: var(--bingo-gold);
            color: black;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            transform: scale(0.95);
        }

        .bingo-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--bingo-gold);
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }

        /* BALOTERO SUPERIOR */
        .ball-display {
            padding: 20px;
            background: linear-gradient(to bottom, transparent, rgba(124, 58, 237, 0.1));
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }


        .ballPop {
            animation: ballPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* PANEL DE ACCESO / PAGO */
        .overlay-pago {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .pago-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            border: 1px solid var(--accent-glow);
        }

        .btn-bingo {
            background: var(--accent-glow);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-bingo:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* CHAT UI */
        #chatContainer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 400px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-glow);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            z-index: 90;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(120%);
        }

        #chatContainer.active {
            transform: translateY(0);
        }

        .chat-header {
            padding: 10px 15px;
            background: var(--accent-glow);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        .chat-input-area {
            padding: 10px;
            display: flex;
            gap: 5px;
            border-top: 1px solid #334155;
        }

        #chatInput {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
        }

        #btnToggleChat {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--accent-glow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 91;
            box-shadow: 0 5px 15px rgba(124, 58, 237, 0.4);
        }

        /* VOICE AREA */
        #voiceContainer {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            z-index: 85;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            border: 2px solid #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }
    </style>
</head>
<body>

    <!-- OVERLAY DE PAGO (Control de Acceso) -->
    <div id="overlayPago" class="overlay-pago">
        <div class="pago-card">
            <h2 style="color: var(--bingo-gold);">¡Bienvenido al Bingo 3D!</h2>
            <p>Para participar en esta ronda, debes adjuntar tu comprobante de pago.</p>
            <p style="font-size: 0.8rem; color: #94a3b8;">Valor de la tabla: <span id="valorTablaLabel">$0</span></p>
            
            <div id="uploadSection">
                <input type="file" id="fileBingo" style="display: none;" onchange="handleFileBingo(event)">
                <button type="button" onclick="document.getElementById('fileBingo').click()" class="btn-bingo" style="background: #334155;">
                    📸 Subir Recibo
                </button>
            </div>
            
            <div id="statusSection" style="display: none; margin-top: 20px;">
                <p id="statusMsg" style="color: #10b981;">✅ Recibo enviado. Esperando aprobación...</p>
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- MAIN GAME UI -->
    <div class="ball-display">
        <div id="lastBalls" style="display: flex; gap: 10px; opacity: 0.5;">
            <!-- Círculos pequeños de balotas anteriores -->
        </div>
        <div id="currentBall" class="bingo-ball">?</div>
        <div style="text-align: left; margin-left: 20px;">
            <div id="gameStatus" style="color: var(--bingo-gold); font-weight: bold;">ESPERANDO...</div>
            <div id="potLabel" style="font-size: 0.9rem;">Bolsa: $0</div>
            <div id="wsStatus" style="font-size: 0.7rem; opacity: 0.5; margin-top: 5px;">
                <span id="wsDot" style="display:inline-block; width:8px; height:8px; background:gray; border-radius:50%; margin-right:5px;"></span>
                Socket: <span id="wsText">Desconectado</span>
            </div>
        </div>
    </div>

    <div class="game-scene">
        <div id="bingoCardContainer">
            <!-- Tabla 3D generada por JS -->
        </div>
    </div>

    <div style="padding: 20px; text-align: center;">
        <button id="btnGritarBingo" type="button" onclick="gritarBingo(event)" class="btn-bingo" style="display: none; background: #ef4444; padding: 20px 60px; font-size: 2rem; letter-spacing: 5px;">
            BINGO!!!
        </button>
    </div>

    <!-- CHAT UI -->
    <div id="btnToggleChat" onclick="toggleChat()">
        <span style="font-size: 1.5rem;">💬</span>
    </div>

    <div id="chatContainer">
        <div class="chat-header">
            <span>Chat del Bingo</span>
            <button onclick="toggleChat()" style="background:transparent; border:none; color:white; cursor:pointer;">✕</button>
        </div>
        <div id="chatMessages" class="chat-messages-container"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') sendChatMessage()">
            <button onclick="sendChatMessage()" style="background:var(--accent-glow); border:none; border-radius:8px; width:40px; color:white;">➤</button>
        </div>
    </div>

    <!-- VOICE PLAYER P2P -->
    <div id="voiceContainer" style="position:fixed; top:20px; left:20px; z-index:1000; opacity:0; pointer-events:none;">
        <audio id="voicePlayer" autoplay playsinline></audio>
        <div id="voiceIndicator" style="background:rgba(16,185,129,0.8); padding:10px 20px; border-radius:30px; display:flex; align-items:center; gap:10px; border:1px solid rgba(255,255,255,0.2); backdrop-filter:blur(5px);">
            <div style="width:10px; height:10px; background:#fff; border-radius:50%; animation: pulse 1.5s infinite;"></div>
            <span style="font-weight:bold; font-size:0.9rem;">EN VIVO: ADMINISTRADOR</span>
        </div>
    </div>

    <!-- AUDIO (Respaldo en caso de fallos de red) -->
    <audio id="soundBall" src="https://assets.mixkit.co/active_storage/sfx/2573/2573-preview.mp3"></audio>
    <audio id="soundWin" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3"></audio>
    <audio id="soundAmbient" loop src=""></audio>

    <!-- Scripts -->
    <script src="js/bingo.js"></script>
</body>
</html>
